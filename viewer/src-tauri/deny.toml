[licenses]
# Explicit allowlist for the locked desktop dependency graph. All other
# licenses are denied. Keep unused entries denied so the policy cannot quietly
# broaden as dependencies disappear.
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8
unused-allowed-license = "deny"

[advisories]
# Tauri 2's Linux WebKit shell currently depends on archived gtk-rs GTK3
# crates. There is no safe upgrade path until Tauri/Wry migrate; review these
# exceptions by 2026-10-01. New advisories remain deny-by-default.
ignore = [
  { id = "RUSTSEC-2024-0411", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0412", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0413", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0414", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0415", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0416", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0417", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0418", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0419", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0420", reason = "Tauri GTK3 transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2024-0370", reason = "gtk-rs macro transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2025-0075", reason = "Tauri urlpattern transitive; no safe upgrade; review 2026-10-01" },
  { id = "RUSTSEC-2025-0080", reason = "Tauri urlpattern transitive; no safe upgrade; review 2026-10-01" },
