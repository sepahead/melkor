name: Bug report
description: Report a defect in melkor or the viewer
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong.
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Exact commands, copy-pasted.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual
      description: What you expected, and what happened instead.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: backend
    attributes:
      label: Backend
      description: Output of `melkor --info`.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or `git rev-parse HEAD`.
    validations:
      required: true
  - type: textarea
    id: input-file
    attributes:
      label: Minimal input file
      description: If the bug depends on an input (GLB/PLY/SPZ), attach the smallest file that reproduces it, or describe how to generate one.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output. Functions log to stderr; capture both streams.
      render: text
