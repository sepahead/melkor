name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install cmake
          ./scripts/setup_deps.sh
      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. && make -j$(sysctl -n hw.ncpu)
      - name: Test
        run: |
          # Run the real correctness test suite (SPZ quaternion order, PLY
          # parsing, PCA normals, SH constant) plus the smoke check.
          cd build && ctest --output-on-failure
          ./melkor --info

  sanitize-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install cmake
          ./scripts/setup_deps.sh
      - name: Build with ASan+UBSan
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="13.0"
          make -j$(sysctl -n hw.ncpu)
      - name: Test under sanitizers
        run: |
          cd build && ctest --output-on-failure

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake build-essential
          ./scripts/setup_deps.sh
      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. && make -j$(nproc)
      - name: Test
        run: |
          cd build && ctest --output-on-failure
          ./melkor --info

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint
        run: |
          pip install ruff
          # Lint Melkor-authored Python only. The root pyproject.toml excludes
          # vendored upstream snapshots (DA3coreml/src is ByteDance code with its
          # own .flake8; ml-sharp is Apple research code). Running ruff with no
          # explicit paths makes it pick up the root config and respect those
          # excludes.
          ruff check . --no-unsafe-fixes
