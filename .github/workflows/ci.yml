name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install cmake
          ./scripts/setup_deps.sh
      - name: Build
        run: |
          cmake -B build -DMELKOR_WERROR=ON
          cmake --build build -j$(sysctl -n hw.ncpu)
      - name: Test
        run: |
          # Run the real correctness test suite (SPZ quaternion order + SH
          # channel order, PLY parsing, PCA normals, provider parity, scene
          # completion) plus the smoke checks.
          cd build && ctest --output-on-failure
          ./melkor --info
          ./melkor --version
      - name: Build CPU-only (stub link topology)
        run: |
          # Same link shape as Linux CPU builds; catches missing Metal-stub
          # symbols that the default macOS configuration cannot see.
          cmake -B build-cpu -DMELKOR_USE_METAL=OFF -DMELKOR_WERROR=ON
          cmake --build build-cpu -j$(sysctl -n hw.ncpu)
          cd build-cpu && ctest --output-on-failure

  sanitize-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install cmake
          ./scripts/setup_deps.sh
      - name: Build with ASan+UBSan
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="13.0"
          make -j$(sysctl -n hw.ncpu)
      - name: Test under sanitizers
        run: |
          cd build && ctest --output-on-failure

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          # The GitHub Ubuntu runner preinstalls Microsoft/azure-cli apt
          # sources that intermittently serve a bad InRelease ('NOSPLIT'),
          # failing apt-get update even though melkor needs none of them.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources || true
          sudo apt-get update && sudo apt-get install -y cmake build-essential
          ./scripts/setup_deps.sh
      - name: Build
        run: |
          cmake -B build -DMELKOR_WERROR=ON
          cmake --build build -j$(nproc)
      - name: Test
        run: |
          cd build && ctest --output-on-failure
          ./melkor --info
          ./melkor --version

  # Compile-only check for the CUDA backend. Hosted runners have no GPU, but
  # nvcc compilation catches the entire class of CUDA build breakage
  # (undefined kernels, signature drift, host/device qualifier errors) that a
  # Metal-only development machine cannot see. Tests are skipped: no device.
  build-linux-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          # Strip the preinstalled Microsoft/azure-cli apt sources that
          # intermittently serve a bad InRelease ('NOSPLIT') and fail
          # apt-get update; melkor's CUDA deps need none of them.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources || true
          sudo apt-get update
          sudo apt-get install -y cmake build-essential nvidia-cuda-toolkit
          ./scripts/setup_deps.sh
      - name: Build with CUDA
        run: |
          nvcc --version
          cmake -B build -DMELKOR_USE_CUDA=ON
          cmake --build build -j$(nproc)

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint
        run: |
          pip install ruff
          # Lint Melkor-authored Python only. The root pyproject.toml excludes
          # vendored upstream snapshots (DA3coreml/src is ByteDance code with its
          # own .flake8; ml-sharp is Apple research code). Running ruff with no
          # explicit paths makes it pick up the root config and respect those
          # excludes.
          ruff check . --no-unsafe-fixes
